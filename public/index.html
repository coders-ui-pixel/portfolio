<style>
:root {
    /* Dark Theme (Default) */
    --bg: #030305;
    --bg-alt: #0a0a0f;
    --bg2: #0a0a0f;
    --bg4: #16161f;
    --bg-card: rgba(16, 16, 24, 0.7);
    --bg-sidebar: #07070b;
    --text: #ffffff;
    --text-dim: #94a3b8;
    --text2: #94a3b8;
    --text-muted: #64748b;
    --text3: #64748b;
    --accent: #6366f1;
    --accent2: #ec4899;
    --accent-glow: rgba(99, 102, 241, 0.5);
    --accent-secondary: #ec4899;
    --accent-tertiary: #14b8a6;
    --border: rgba(255, 255, 255, 0.08);
    --border2: rgba(255, 255, 255, 0.12);
    --border-hover: rgba(255, 255, 255, 0.15);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.05);
    --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    --font-main: 'Space Grotesk', sans-serif;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --danger: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
}

[data-theme="light"] {
    --bg: #f8fafc;
    --bg-alt: #f1f5f9;
    --bg2: #f1f5f9;
    --bg4: #e2e8f0;
    --bg-card: rgba(255, 255, 255, 0.8);
    --bg-sidebar: #ffffff;
    --text: #0f172a;
    --text-dim: #475569;
    --text2: #475569;
    --text-muted: #64748b;
    --text3: #94a3b8;
    --accent: #4f46e5;
    --accent2: #db2777;
    --accent-glow: rgba(79, 70, 229, 0.3);
    --accent-secondary: #db2777;
    --accent-tertiary: #0d9488;
    --border: rgba(0, 0, 0, 0.08);
    --border2: rgba(0, 0, 0, 0.12);
    --border-hover: rgba(0, 0, 0, 0.15);
    --glass: rgba(0, 0, 0, 0.02);
    --glass-border: rgba(0, 0, 0, 0.04);
    --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    --danger: #dc2626;
    --success: #16a34a;
    --warn: #d97706;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: var(--font-main); 
    line-height: 1.6; 
    transition: background-color 0.5s ease, color 0.5s ease;
    overflow-x: hidden;
}

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { 
    width: 280px; 
    background: var(--bg-sidebar); 
    border-right: 1px solid var(--border); 
    position: fixed; 
    height: 100vh; 
    z-index: 1000;
    padding: 2rem 1.5rem;
    transition: var(--transition);
}
.main { margin-left: 280px; flex: 1; min-height: 100vh; position: relative; }

/* Components */
.glass-card {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    transition: var(--transition);
}
.btn {
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-main);
    font-size: 0.9rem;
}
.btn-primary { 
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); 
    color: white;
}
.btn-ghost { background: var(--glass); color: var(--text); border: 1px solid var(--border); }

/* Public Navigation */
.pub-nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.pub-nav-links { display: flex; gap: 2rem; align-items: center; }
.pub-nav-link { font-size: 0.9rem; color: var(--text-dim); cursor: pointer; transition: var(--transition); }
.pub-nav-link.cta { background: var(--accent); color: white; padding: 0.6rem 1.2rem; border-radius: 50px; }

/* Content Layout */
.pub-content { 
    padding: 40px 2rem 100px; 
    max-width: 1100px; 
    margin: 0 auto;
    width: 100%;
}

.hero {
    min-height: calc(100vh - 250px);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Sections */
.section-tag { font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: block; }
.section-heading { font-family: var(--font-display); font-weight: 800; font-size: 2.5rem; margin-bottom: 2rem; }

/* Hero Section */
.hero { padding: 120px 0 80px; text-align: center; display: flex; flex-direction: column; align-items: center; }
.hero-title { font-family: var(--font-display); font-weight: 800; font-size: clamp(3rem, 8vw, 5rem); line-height: 1.1; margin-bottom: 1.5rem; }

/* Skills Grid */
.skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
.skill-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem; text-align: center; transition: var(--transition); }
.skill-card:hover { background: var(--bg-card); border-color: var(--accent); transform: translateY(-5px); }
.skill-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
.skill-name { font-weight: 600; font-size: 1rem; }

/* Project Grid */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
.project-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; transition: var(--transition); }
.project-card:hover { border-color: var(--accent); transform: translateY(-8px); }
.proj-tag { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0.4rem 0.8rem; background: var(--glass); color: var(--accent); border-radius: 8px; margin-bottom: 1.5rem; display: inline-block; }
.proj-title { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; margin-bottom: 1rem; }
.proj-desc { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 1.5rem; }
.proj-techs { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.tech-pill { padding: 0.3rem 0.7rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 6px; font-size: 0.75rem; font-family: var(--font-mono); color: var(--accent-tertiary); }

/* Live Stream */
.live-container { background: #000; border-radius: 24px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid var(--glass-border); }
.chat-box { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 24px; height: 450px; display: flex; flex-direction: column; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.chat-msg { font-size: 0.9rem; line-height: 1.5; }
.chat-msg .uname { color: var(--accent); font-weight: 700; margin-right: 0.5rem; }
.chat-input-row { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 1rem; }

/* Dashboard & Admin Components */
.page-header { margin-bottom: 2rem; }
.page-title { font-family: var(--font-display); font-weight: 700; font-size: 2rem; }
.card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem; }
.table-wrap { border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--glass); padding: 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); }
td { padding: 1rem; border-bottom: 1px solid var(--border); }

/* Typing Effect */
.typing-cursor { display: inline-block; width: 3px; height: 1em; background-color: var(--accent); margin-left: 2px; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* Animations */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate-fade-in { animation: fadeInUp 0.8s ease-out forwards; }

/* Notifications */
.notification { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 12px; background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--accent); color: var(--text); z-index: 2000; box-shadow: var(--shadow); animation: fadeInUp 0.4s ease-out; }

/* Navigation */
.nav-item { display: flex; align-items: center; padding: 1rem; color: var(--text-dim); text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; transition: var(--transition); cursor: pointer; }
.nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); }
.nav-item i { margin-right: 1rem; font-size: 1.2rem; }

/* Theme Toggle */
.theme-toggle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--glass); border: 1px solid var(--border); transition: var(--transition); }
.theme-toggle:hover { transform: rotate(15deg); border-color: var(--accent); }

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(108,99,255,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.login-card{width:420px;padding:44px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;position:relative}
.login-logo{width:58px;height:58px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:24px;color:#fff;margin:0 auto 22px}
.login-title{font-family:var(--font-display);font-weight:700;font-size:24px;text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{text-align:center;font-size:13px;color:var(--text3);margin-top:22px}
.auth-link span{color:var(--accent);cursor:pointer;font-weight:500}
.auth-link span:hover{text-decoration:underline}

/* ALERTS */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.alert-error{background:rgba(239,68,68,.08);color:var(--danger);border:1px solid rgba(239,68,68,.18)}
.alert-success{background:rgba(34,197,94,.08);color:var(--success);border:1px solid rgba(34,197,94,.18)}
.alert-info{background:rgba(108,99,255,.08);color:var(--accent);border:1px solid rgba(108,99,255,.18)}

/* PAGE */
.page-header{margin-bottom:28px}
.page-title{font-family:var(--font-display);font-weight:700;font-size:26px;margin-bottom:5px}
.page-desc{font-size:13px;color:var(--text3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--bg2)}
.close-btn{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;padding:4px;transition:.15s}
.close-btn:hover{color:var(--text)}

/* MISC */
.flex{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px}
.skill-chip{padding:6px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;color:var(--text2)}
.skill-chip.active{border-color:rgba(108,99,255,.4);color:var(--accent);background:rgba(108,99,255,.06)}
.sep{height:1px;background:var(--border);margin:20px 0}
.text-sm{font-size:13px;color:var(--text2)}
.text-xs{font-size:11px;color:var(--text3)}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block}
.tag-sa{background:rgba(239,68,68,.1);color:var(--danger)}
.tag-admin{background:rgba(245,158,11,.1);color:var(--warn)}
.tag-user{background:rgba(108,99,255,.1);color:var(--accent)}

/* NOTIFICATION */
.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    z-index: 2000;
    max-width: 320px;
    animation: notif-in .3s ease;
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
    border-left: 3px solid var(--accent);
}
@keyframes notif-in{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
.notif-success{border-left-color: var(--success)}
.notif-error{border-left-color: var(--danger)}
.notif-info{border-left-color: var(--accent)}

@media(max-width:768px){
    .sidebar{transform:translateX(-280px);}.main{margin-left:0}
    .grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}
    .form-row{grid-template-columns:1fr}.pub-nav-links{display:none}
    .pub-content{padding:0 16px 60px}.hero-title{font-size:36px}</style>

<script>
/* ============================================================
   STORAGE
============================================================ */
const SK = 'bk_platform_v3';
async function load(){
  try{
    const res = await fetch('/api/data');
    const data = await res.json();
    return data && Object.keys(data).length > 0 ? data : null;
  }catch(e){
    return null;
  }
}
async function save(s){
  try{
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s)
    });
  }catch(e){
    console.error('Failed to save data', e);
  }
}

const DEF = {
  theme: 'dark',
  users:[{
    id:'sa1',name:'Bal Krishna',email:'admin@balkrishna.dev',password:'Admin@2024',
    role:'superadmin',createdAt:'2024-01-01',data:[],bio:'IT Professional & Full Stack Developer'
  }],
  sections:[
    {id:'hero',type:'hero',label:'Hero Banner',visible:true,order:0,settings:{
      title:'Bal Krishna',
      subtitle:'Full Stack Developer & IT Professional',
      typingEffect: true,
      typingSpeed: 100,
      tagline:'C · C++ · DSA · Python · React · Tailwind · Bootstrap'
    }},
    {id:'skills',type:'skills',label:'Skills',visible:true,order:1,settings:{

      skills:[
        {name:'C',icon:'⚙️',level:'Expert'},{name:'C++',icon:'🔧',level:'Expert'},
        {name:'DSA',icon:'🌳',level:'Advanced'},{name:'Python',icon:'🐍',level:'Expert'},
        {name:'React',icon:'⚛️',level:'Advanced'},{name:'Tailwind',icon:'🎨',level:'Expert'},
        {name:'Bootstrap',icon:'🅱️',level:'Advanced'},{name:'JavaScript',icon:'🟨',level:'Advanced'},
        {name:'Git',icon:'📦',level:'Expert'},{name:'Linux',icon:'🐧',level:'Advanced'},
        {name:'SQL',icon:'🗄️',level:'Intermediate'},{name:'Node.js',icon:'🟩',level:'Intermediate'}
      ]
    }},
    {id:'projects',type:'projects',label:'Projects',visible:true,order:2,settings:{
      heading:'Featured Projects',
      items:[
        {title:'DSA Visualizer',tag:'Open Source',desc:'Interactive data structures & algorithm visualizer with step-by-step animations.',techs:['React','TypeScript','Canvas API']},
        {title:'CMS Platform',tag:'Full Stack',desc:'Role-based content management system with admin panel and user dashboard.',techs:['Node.js','React','MongoDB','JWT']},
        {title:'CLI Toolkit',tag:'C++',desc:'High-performance command-line utilities for system administration and file ops.',techs:['C++','Bash','CMake','POSIX']}
      ]
    }},
    {id:'live',type:'live',label:'Live Stream',visible:true,order:3,settings:{
      heading:'Live Sessions',streamUrl:'',isLive:false,
      description:'Join my live coding, teaching & Q&A sessions!'
    }},
    {id:'contact',type:'contact',label:'Contact',visible:true,order:4,settings:{
      heading:'Get In Touch',email:'admin@balkrishna.dev',
      github:'github.com/balkrishna',linkedin:'linkedin.com/in/balkrishna'
    }}
  ],
  liveViewers:0,liveMessages:[],
  siteSettings:{
    siteName:'Bal Krishna',tagline:'Full Stack Developer & IT Professional',
    accentColor:'#6366f1',accentColor2:'#ec4899',accentColor3:'#14b8a6',
    allowSignup:true,socialLinks:{github:'',linkedin:'',twitter:''},
    footerText: '© 2024 Bal Krishna. All rights reserved.',
    headerStyle: 'glass'
  }
};

let ST = JSON.parse(JSON.stringify(DEF));

let CU=null,VIEW='public',PAGE='overview',APAGE='dashboard',PUB_PAGE='hero';
let MODAL=null,EDIT_SEC=null,EDIT_USER=null;
let NOTIF=null,NT=null;
let typingIdx = 0;
let isDeleting = false;
let currentText = '';
let typingTimeout = null;

/* SECURITY STATE */
const LOCKOUT_LIMIT = 5;
const LOCKOUT_TIME = 15 * 60 * 1000; // 15 mins
const SESSION_TIME = 30 * 60 * 1000; // 30 mins

/* ============================================================
   UTILS
============================================================ */
function notify(msg,type='info'){
  NOTIF={msg,type};render();
  if(NT)clearTimeout(NT);
  NT=setTimeout(()=>{NOTIF=null;renderNotif()},3600);
}
function persist(){save(ST);}
function mkid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function inits(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().substr(0,2)}
function qs(s){return document.querySelector(s)}
function applyColors(){
  const s=ST.siteSettings;
  const r=document.documentElement.style;
  r.setProperty('--accent',s.accentColor);
  r.setProperty('--accent2',s.accentColor2);
  r.setProperty('--accent3',s.accentColor3);
  document.documentElement.setAttribute('data-theme', ST.theme || 'dark');
}
function toggleTheme(){
  ST.theme = ST.theme === 'dark' ? 'light' : 'dark';
  persist();
  applyColors();
  render();
}
function typeWriter() {
  const hero = ST.sections.find(s => s.id === 'hero');
  if (!hero || !hero.settings.typingEffect || VIEW !== 'public') return;
  
  const fullText = hero.settings.title || 'Bal Krishna';
  const speed = hero.settings.typingSpeed || 100;
  
  if (!isDeleting && typingIdx <= fullText.length) {
    currentText = fullText.substring(0, typingIdx++);
  } else if (isDeleting && typingIdx >= 0) {
    currentText = fullText.substring(0, typingIdx--);
  }

  const target = document.getElementById('typing-title');
  if (target) target.innerHTML = currentText + '<span class="typing-cursor"></span>';

  if (typingIdx > fullText.length) {
    typingTimeout = setTimeout(() => { isDeleting = true; typeWriter(); }, 3000);
  } else if (typingIdx < 0) {
    isDeleting = false;
    typingIdx = 0;
    typingTimeout = setTimeout(typeWriter, speed);
  } else {
    typingTimeout = setTimeout(typeWriter, isDeleting ? speed / 2 : speed);
  }
}
function esc(str) {
  if (typeof str !== 'string') return str;
  const p = document.createElement('p');
  p.textContent = str;
  return p.innerHTML;
}

/* ============================================================
   RENDER ENGINE
============================================================ */
function render(){
  checkSession();
  applyColors();
  let html='';
  if(VIEW==='login'||VIEW==='register') html=rLogin(VIEW);
  else if(VIEW==='public') html=rPublic();
  else if(VIEW==='admin') html=rAdmin();
  else if(VIEW==='dashboard') html=rUserDash();
  const m=rModal();
  document.getElementById('app').innerHTML=html+(m||'');
  renderNotif();
  
  if(typingTimeout) clearTimeout(typingTimeout);
  if(VIEW==='public' && PUB_PAGE === 'hero') {
    typingIdx = 0; isDeleting = false; currentText = '';
    typeWriter();
  }
}

function renderNotif(){
  const ex=document.querySelector('.notification');
  if(ex)ex.remove();
  if(!NOTIF)return;
  const d=document.createElement('div');
  d.className='notification notif-'+NOTIF.type;
  d.textContent=NOTIF.msg;
  document.body.appendChild(d);
}

/* ============================================================
   AUTH
============================================================ */
async function hash(pw) {
  const msgUint8 = new TextEncoder().encode(pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin(){
  const em=qs('#em')?.value?.trim(),pw=qs('#pw')?.value;
  const al=qs('#auth-alert');
  
  // Check Lockout
  const lock = JSON.parse(localStorage.getItem('bk_lock') || '{}');
  if(lock.expiry && Date.now() < lock.expiry) {
    const mins = Math.ceil((lock.expiry - Date.now()) / 60000);
    al.innerHTML = `<div class="alert alert-error">Too many attempts. Try again in ${mins} mins.</div>`;
    return;
  }

  if(!em||!pw){al.innerHTML='<div class="alert alert-error">Please fill all fields.</div>';return;}
  const hpw = await hash(pw);
  const u=ST.users.find(user=>user.email.toLowerCase()===em.toLowerCase() && (user.password===pw || user.password===hpw));
  
  if(!u){
    let attempts = (lock.attempts || 0) + 1;
    if(attempts >= LOCKOUT_LIMIT) {
      localStorage.setItem('bk_lock', JSON.stringify({attempts: 0, expiry: Date.now() + LOCKOUT_TIME}));
      al.innerHTML = `<div class="alert alert-error">Max attempts reached. Locked for 15 mins.</div>`;
    } else {
      localStorage.setItem('bk_lock', JSON.stringify({attempts, expiry: 0}));
      al.innerHTML = `<div class="alert alert-error">Invalid credentials. (${LOCKOUT_LIMIT - attempts} attempts left)</div>`;
    }
    return;
  }
  
  // Success
  localStorage.removeItem('bk_lock');
  localStorage.setItem('bk_session', JSON.stringify({uid: u.id, expiry: Date.now() + SESSION_TIME}));
  
  if(u.role !== 'admin' && u.role !== 'superadmin') {
    CU=u;
    VIEW='public';
    notify('Logged in as '+u.name.split(' ')[0]+'. View mode only.','info');
  } else {
    CU=u;
    VIEW='admin';
    PAGE='overview';APAGE='dashboard';
    notify('Welcome back, Admin '+u.name.split(' ')[0]+'!','success');
  }
  render();
}
function checkSession() {
  const sess = JSON.parse(localStorage.getItem('bk_session'));
  if(!sess) return;
  if(Date.now() > sess.expiry) {
    doLogout();
    notify('Session expired. Please log in again.', 'warn');
    return;
  }
  // Extend session on activity
  sess.expiry = Date.now() + SESSION_TIME;
  localStorage.setItem('bk_session', JSON.stringify(sess));
  if(!CU) {
    CU = ST.users.find(u => u.id === sess.uid);
    if(!CU) doLogout();
  }
}
async function doRegister(){
  const nm=qs('#rn')?.value?.trim(),em=qs('#em')?.value?.trim(),pw=qs('#pw')?.value;

  if(ST.users.find(u=>u.email.toLowerCase()===em.toLowerCase())){al.innerHTML='<div class="alert alert-error">Email taken.</div>';return;}

}

    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="un"></div>
      <div class="form-group"><label class="form-label">Email *</label><input class="form-input" id="ue" type="email"></div>
      <div class="form-group"><label class="form-label">Password *</label><input class="form-input" id="up" type="password" placeholder="Min 6 chars"></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-input" id="ur">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveUser()">Create User</button></div>`;
  }

  if(MODAL==='view-udata'&&EDIT_USER){
    const ud=EDIT_USER.data||[];
    inner=`
    <div class="modal-header"><div><div class="card-title">${EDIT_USER.name}'s Data</div><div class="text-xs">${ud.length} records</div></div><button class="close-btn" onclick="closeM()">×</button></div>
    <div class="modal-body">
      ${ud.length===0?'<div class="text-sm" style="text-align:center;padding:28px;color:var(--text3)">No records yet</div>':
        `<div class="table-wrap"><table><thead><tr><th>Title</th><th>Category</th><th>Notes</th><th>Date</th></tr></thead>
        <tbody>${ud.map(d=>`<tr><td>${d.title}</td><td>${d.cat||'—'}</td><td class="text-xs">${d.notes||'—'}</td><td class="text-xs">${d.date||'—'}</td></tr>`).join('')}</tbody>
        </table></div>`}
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" onclick="expUData('${EDIT_USER.id}')">Export Excel</button>
      <button class="btn btn-secondary" onclick="closeM()">Close</button>
    </div>`;
  }

  if(MODAL==='add-sec'){
    inner=`
    <div class="modal-header"><div class="card-title">Add Custom Section</div><button class="close-btn" onclick="closeM()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Section Label *</label><input class="form-input" id="sl-i" placeholder="About Me, Blog, FAQ, Gallery…"></div>
      <div class="form-group"><label class="form-label">Content</label><textarea class="form-input form-textarea" id="sc-i" placeholder="Write your section content here…" style="min-height:120px"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveSec()">Add Section</button></div>`;
  }

  if(MODAL==='edit-sec'&&EDIT_SEC){
    const s=EDIT_SEC;
    let f='';
    if(s.type==='hero') f=`
      <div class="form-group"><label class="form-label">Display Name</label><input class="form-input" id="eh-t" value="${s.settings.title||''}"></div>
      <div class="form-group"><label class="form-label">Subtitle</label><input class="form-input" id="eh-s" value="${s.settings.subtitle||''}"></div>
      <div class="form-group">
        <label class="form-label">Typing Effect</label>
        <div class="flex mt-8">
          <label class="toggle"><input type="checkbox" id="eh-te" ${s.settings.typingEffect?'checked':''}><span class="toggle-track"></span></label>
          <span class="text-sm">Enable animated typing</span>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Typing Speed (ms)</label><input class="form-input" type="number" id="eh-tsp" value="${s.settings.typingSpeed||100}"></div>
      <div class="form-group"><label class="form-label">Tech tags (separated by ·)</label><input class="form-input" id="eh-g" value="${s.settings.tagline||''}"></div>`;
    else if(s.type==='custom') f=`<div class="form-group"><label class="form-label">Content</label><textarea class="form-input form-textarea" id="ec-c" style="min-height:160px">${s.settings.content||''}</textarea></div>`;
    else if(s.type==='contact') f=`
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="ec-e" value="${s.settings.email||''}"></div>
      <div class="form-group"><label class="form-label">GitHub</label><input class="form-input" id="ec-g" value="${s.settings.github||''}"></div>
      <div class="form-group"><label class="form-label">LinkedIn</label><input class="form-input" id="ec-l" value="${s.settings.linkedin||''}"></div>`;
    else if(s.type==='live') f=`
      <div class="form-group"><label class="form-label">Section Heading</label><input class="form-input" id="el-h" value="${s.settings.heading||''}"></div>
      <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="el-d" value="${s.settings.description||''}"></div>
      <div class="form-group"><label class="form-label">Stream Embed URL</label><input class="form-input" id="el-u" value="${s.settings.streamUrl||''}" placeholder="https://www.youtube.com/embed/..."></div>`;
    else if(s.type==='skills') f=`<div class="alert alert-info">Skills editing: go to the section label field below. Full skill editing via code/JSON for now.</div>`;
    else if(s.type==='projects') f=`<div class="alert alert-info">Projects editing: full UI editor coming soon. Update section label below.</div>`;
    else f=`<div class="alert alert-info">This section type has built-in settings. Toggle visibility from the sections list.</div>`;
    inner=`
    <div class="modal-header"><div class="card-title">Edit: ${s.label}</div><button class="close-btn" onclick="closeM()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Section Label</label><input class="form-input" id="es-lbl" value="${s.label}"></div>
      ${f}
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveSecEdit()">Save Changes</button></div>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this)closeM()"><div class="modal">${inner}</div></div>`;
}

function closeM(){MODAL=null;EDIT_SEC=null;EDIT_USER=null;render();}

function saveData(){
  const t=qs('#dt')?.value?.trim(),c=qs('#dc')?.value?.trim()||'General',n=qs('#dn')?.value?.trim()||'';
  if(!t){notify('Title required','error');return;}
  const u=ST.users.find(u=>u.id===CU.id);if(!u)return;
  u.data=u.data||[];
  u.data.push({id:mkid(),title:t,cat:c,notes:n,date:new Date().toISOString().split('T')[0]});
  CU=u;persist();MODAL=null;notify('Record added! ✓','success');render();
}

function saveUser(){
  const n=qs('#un')?.value?.trim(),e=qs('#ue')?.value?.trim(),p=qs('#up')?.value,r=qs('#ur')?.value||'user';
  if(!n||!e||!p){notify('Fill all fields','error');return;}
  if(p.length<6){notify('Password min 6 chars','error');return;}
  if(ST.users.find(u=>u.email.toLowerCase()===e.toLowerCase())){notify('Email already exists','error');return;}
  ST.users.push({id:mkid(),name:n,email:e,password:p,role:r,createdAt:new Date().toISOString().split('T')[0],data:[],bio:''});
  persist();MODAL=null;notify('User created! ✓','success');render();
}

function saveSec(){
  const lbl=qs('#sl-i')?.value?.trim(),cont=qs('#sc-i')?.value||'';
  if(!lbl){notify('Label required','error');return;}
  const maxO=Math.max(...ST.sections.map(s=>s.order))+1;
  ST.sections.push({id:mkid(),type:'custom',label:lbl,visible:true,order:maxO,settings:{content:cont,heading:lbl}});
  persist();MODAL=null;notify('Section added! ✓','success');render();
}

function saveSecEdit(){
  if(!EDIT_SEC)return;
  const s=ST.sections.find(s=>s.id===EDIT_SEC.id);if(!s)return;
  const lbl=qs('#es-lbl')?.value?.trim();if(lbl)s.label=lbl;
  if(s.type==='hero'){
    if(qs('#eh-t'))s.settings.title=qs('#eh-t').value.trim();
    if(qs('#eh-s'))s.settings.subtitle=qs('#eh-s').value.trim();
    if(qs('#eh-te'))s.settings.typingEffect=qs('#eh-te').checked;
    if(qs('#eh-tsp'))s.settings.typingSpeed=parseInt(qs('#eh-tsp').value)||100;
    if(qs('#eh-g'))s.settings.tagline=qs('#eh-g').value.trim();
  }
  if(s.type==='custom'&&qs('#ec-c'))s.settings.content=qs('#ec-c').value;
  if(s.type==='contact'){
    if(qs('#ec-e'))s.settings.email=qs('#ec-e').value.trim();
    if(qs('#ec-g'))s.settings.github=qs('#ec-g').value.trim();
    if(qs('#ec-l'))s.settings.linkedin=qs('#ec-l').value.trim();
  }
  if(s.type==='live'){
    if(qs('#el-h'))s.settings.heading=qs('#el-h').value.trim();
    if(qs('#el-d'))s.settings.description=qs('#el-d').value.trim();
    if(qs('#el-u'))s.settings.streamUrl=qs('#el-u').value.trim();
  }
  persist();MODAL=null;EDIT_SEC=null;notify('Section updated! ✓','success');render();
}

/* ============================================================
   BOOT
=========================================================== */
async function boot() {
  const data = await load();
  if (data) {
    ST = data;
  }
  
  if(!ST.theme) ST.theme = 'dark';
  if(!ST.siteSettings.footerText) ST.siteSettings.footerText = DEF.siteSettings.footerText;
  if(!ST.users.find(u=>u.role==='superadmin')){ST.users=[...DEF.users,...ST.users];}
  if(!ST.liveMessages) ST.liveMessages=[];
  if(!ST.liveViewers) ST.liveViewers=0;

  applyColors();
  render();
}
boot();
</script>
</body>
</html>
